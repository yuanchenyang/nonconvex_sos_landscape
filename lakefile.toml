name = "TernaryQuartic"
version = "0.1.0"
keywords = ["math", "sos", "lean"]
defaultTargets = [
  "TernaryQuartic",
  "QuaternaryQuartic",
]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "TernaryQuartic"
globs = ["TernaryQuartic.+"]

[[lean_lib]]
name = "QuaternaryQuartic"
globs = ["QuaternaryQuartic.+"]
